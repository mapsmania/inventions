<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Birthplace Guess Game</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<link href="stylesheet.css" rel="stylesheet" />

</head>

<body>

<div id="layout">
<div id="welcomeOverlay">
  <!-- First choice panel -->
  <div id="welcomeChoice" class="welcomePanel">
    <h1>Famous Birthplace Game</h1>
    <p>Test your geography skills!</p>
    <button id="worldGameBtn">🌍 World Game</button>
    <button id="countryGameBtn">🇺🇸 Country Game</button>
  </div>

  <!-- Second panel: country list, hidden initially -->
  <div id="countryListPanel" class="welcomePanel" style="display:none;">
    <h1>Choose a Country</h1>
    <div id="countryButtons" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
    <button id="backToChoice">⬅ Back</button>
  </div>
</div>
  <div id="map"></div>


    <div id="panel">
<div id="scrollContent">
    <div id="question"></div>



    <img id="photo" style="width:100%;max-width:200px;display:none;margin-top:8px">
   <div id="scoreBar">
<div id="scoreFill"></div>
</div>
    <div id="result"></div>
    
         
</div>    

    <button id="nextBtn" style="display:none">Next</button>

  </div>

<div id="summaryOverlay">
  <div id="summaryContent">

    <h2 id="summaryTitle">Game Results</h2>

    <div id="summaryGrid"></div>

    <button id="playAgainBtn">Play Again</button>

  </div>
</div>

  

</div>

    
<script src="guess.js"></script>

</body>
</html>

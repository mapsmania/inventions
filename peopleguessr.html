<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Birthplace Guess Game</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
}

#layout{
  display:flex;
  height:100vh;
}

/* Map takes most of the space */
#map{
  flex:3;
  position:relative;
  z-index:1;  
}

/* Side panel */
#panel{
  flex:1;
  padding:16px;
  overflow-y:auto;
  background:#ffffff;
  border-left:1px solid #ddd;
  position:relative;
  z-index:1;
}

#question{
  font-size:18px;
  margin-bottom:10px;
}

#result{
  margin-top:10px;
}

button {
  margin-top: 12px;
  padding: 10px 18px;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  background: linear-gradient(135deg, rgba(0,123,255,0.85), rgba(0,180,255,0.85));
  border: none;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.15);
  backdrop-filter: blur(5px); /* subtle glass effect */
  transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
}

button:hover {
  background: linear-gradient(135deg, rgba(0,100,220,0.95), rgba(0,160,220,0.95));
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

button:active {
  transform: translateY(0);
  box-shadow: 0 3px 6px rgba(0,0,0,0.15);
}
    
#summaryOverlay{
  position:fixed;
  inset:0;

  background:white;

  z-index:999999;

  display:none;

  overflow-y:auto;      /* full scroll container */
}

#summaryContent{
  width:95%;
  max-width:1400px;

  margin:15px auto 60px auto;   /* smaller top, larger bottom */

  text-align:center;
}
    
    #summaryGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:25px;

  margin-top:30px;
  margin-bottom:30px;   /* ensures button is visible */
}

 #summaryTitle{
  margin-top:5px;
  margin-bottom:10px;
}   

.personCard{
  text-align:center;
}

.personCard img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:8px;
}

.personName{
  font-weight:bold;
  margin-top:8px;
}

.personScore{
  font-size:14px;
}

#playAgainBtn{
  margin-top:20px;
  margin-bottom:40px;   /* space below button */

  padding:12px 26px;
  font-size:16px;
  cursor:pointer;
}

.scoreGreat { color:#2ecc71; }
.scoreGood { color:#f1c40f; }
.scoreBad { color:#e67e22; }
.scoreTerrible { color:#e74c3c; }

.personScore { font-weight:bold; }    
    
@media (max-width: 768px){

  #layout{
    flex-direction:column;
  }

  #map{
    height:55vh;
  }

  #panel{
    height:45vh;
    border-left:none;
    border-top:1px solid #ddd;
  }

}    
</style>
</head>

<body>

<div id="layout">

  <div id="map"></div>


    <div id="panel">

    <div id="question"></div>

    <img id="photo" style="width:100%;max-width:200px;display:none;margin-top:8px">

    <div id="result"></div>

    <button id="nextBtn" style="display:none">Next</button>

  </div>

<div id="summaryOverlay">
  <div id="summaryContent">

    <h2 id="summaryTitle">Game Results</h2>

    <div id="summaryGrid"></div>

    <button id="playAgainBtn">Play Again</button>

  </div>
</div>

  

</div>


    
<script src="guess.js"></script>

</body>
</html>
